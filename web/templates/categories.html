{% extends "base.html" %}
{% block title %}All Pest Control Services | {{ SITE_NAME }}{% endblock %}
{% block canonical %}/categories{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <h1 class="text-3xl font-extrabold mb-8">Pest control services</h1>
  <div class="grid sm:grid-cols-2 md:grid-cols-3 gap-5">
    {% for c in rows %}
    <a href="/category/{{ cat_slug(c.category) }}" class="bg-white rounded-2xl border p-6 hover:shadow-lg hover:border-primary/30 transition-all">
      <span class="w-12 h-12 rounded-xl bg-primary/10 text-primary flex items-center justify-center text-xl mb-4"><i class="fa-solid {{ CATEGORY_ICONS.get(c.category,'fa-bug') }}"></i></span>
      <div class="font-bold">{{ c.category }}</div>
      <div class="text-sm text-gray-400 mt-1">{{ c.n }} providers</div>
    </a>
    {% endfor %}
  </div>
</div>
{% endblock %}
